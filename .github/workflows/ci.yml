name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  rails:
    name: Rails quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexspro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d nexspro_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/nexspro_test
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/nexspro_test
      RUBOCOP_CACHE_ROOT: tmp/rubocop

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v5
        with:
          path: tmp/rubocop
          key: rubocop-${{ runner.os }}-${{ hashFiles('.ruby-version', '.rubocop.yml', 'Gemfile.lock') }}
          restore-keys: |
            rubocop-${{ runner.os }}-

      - name: Validate CI script syntax
        run: bash -n bin/ci

      - name: Run Rails CI
        run: bin/ci

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate Compose configuration
        run: docker compose config

      - name: Build application image
        run: docker build --pull --tag nexspro-app:${{ github.sha }} .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: nexspro-app:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          scanners: vuln
          vuln-type: os
          severity: CRITICAL,HIGH

      - name: Build Compose app service
        run: docker compose build app

      - name: Install gems in Docker bundle volume
        run: docker compose run --rm app bundle install

      - name: Run Dockerized Rails CI
        run: docker compose run --rm app bin/ci

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan secrets with Gitleaks
        run: >-
          docker run --rm
          -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:latest
          detect
          --source /repo
          --no-banner
          --redact
          --exit-code 1

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ruby
          build-mode: none

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.actor != 'dependabot[bot]'

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Scan with Semgrep CE
        run: semgrep scan --config auto
