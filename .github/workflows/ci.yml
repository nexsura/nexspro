name: Checks

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Lint workflows
        run: >-
          docker run --rm
          -v "$PWD:/repo"
          --workdir /repo
          rhysd/actionlint:latest
          -color

  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Lint Dockerfile
        run: >-
          docker run --rm
          -i
          ghcr.io/hadolint/hadolint
          hadolint
          --ignore DL3005
          --ignore DL3008
          -
          < Dockerfile

  assets:
    name: Assets
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      RAILS_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Build assets
        run: |
          bin/rails tailwindcss:build
          bin/rails assets:precompile

  rails:
    name: Rails
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexspro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d nexspro_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/nexspro_test
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/nexspro_test
      RUBOCOP_CACHE_ROOT: tmp/rubocop

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v6
        with:
          path: tmp/rubocop
          key: rubocop-${{ runner.os }}-${{ hashFiles('.ruby-version', '.rubocop.yml', 'Gemfile.lock') }}
          restore-keys: |
            rubocop-${{ runner.os }}-

      - name: Validate CI script syntax
        run: bash -n bin/ci

      - name: Run Rails CI
        run: bin/ci

  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexspro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d nexspro_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/nexspro_test
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/nexspro_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare app
        run: |
          bin/rails db:prepare
          bin/rails tailwindcss:build

      - name: Start and probe
        run: |
          bin/rails server -b 127.0.0.1 -p 3000 &
          server_pid="$!"
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/up >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:3000/up >/dev/null
          curl -fsS http://127.0.0.1:3000/ >/tmp/nexspro-home.html
          test -s /tmp/nexspro-home.html

  docker-smoke:
    name: Docker Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build app
        run: docker compose build app

      - name: Install gems
        run: docker compose run --rm app bundle install

      - name: Prepare app
        run: |
          docker compose run --rm app bin/rails db:prepare
          docker compose run --rm app bin/rails tailwindcss:build

      - name: Start and probe
        run: |
          docker compose up --detach app
          trap 'docker compose down --remove-orphans' EXIT

          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/up >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:3000/up >/dev/null
          curl -fsS http://127.0.0.1:3000/ >/tmp/nexspro-docker-home.html
          test -s /tmp/nexspro-docker-home.html

  docker:
    name: Docker
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Validate Compose configuration
        run: docker compose config

      - name: Build application image
        run: docker build --pull --tag nexspro-app:${{ github.sha }} .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: nexspro-app:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          scanners: vuln
          vuln-type: os
          severity: CRITICAL,HIGH

      - name: Build Compose app service
        run: docker compose build app

      - name: Install gems in Docker bundle volume
        run: docker compose run --rm app bundle install

      - name: Run Dockerized Rails CI
        run: docker compose run --rm app bin/ci

  gitleaks:
    name: Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Scan secrets with Gitleaks
        run: >-
          docker run --rm
          -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:latest
          detect
          --source /repo
          --no-banner
          --redact
          --exit-code 1

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ruby
          build-mode: none

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.actor != 'dependabot[bot]'

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Scan with Semgrep CE
        run: semgrep scan --config auto
